# 3Dorth — RESTRICTED deploy (non-privileged Rancher/RKE2/containerd, no systemd,
# no Docker bridge, images built ELSEWHERE and loaded via `docker load`).
#
# Standalone file (do NOT merge with docker-compose.yml — it uses host networking
# and pre-built images):
#   docker compose -f docker-compose.restricted.yml --profile all up -d --no-build
# or just: ./scripts/deploy_restricted.sh
#
# Host networking (no bridge is available): each service binds a HOST port directly
#   api   -> :8000     react -> :8088 (nginx, proxies /api -> 127.0.0.1:8000)
#   trame -> :8081
# Then tunnel with: ./scripts/share.sh 8088 8081
#
# Compute env is set by scripts/dynamic_resources.sh (RAM/MIG-aware); the defaults
# below are conservative fallbacks if you run this file directly.
x-env: &env
  THREEDORTH_MAX_SESSIONS: ${THREEDORTH_MAX_SESSIONS:-6}
  THREEDORTH_COMPUTE_CONCURRENCY: ${THREEDORTH_COMPUTE_CONCURRENCY:-2}
  THREEDORTH_MAX_WORK_VOXELS: ${THREEDORTH_MAX_WORK_VOXELS:-35000000}
  THREEDORTH_MAX_ISO_VOXELS: ${THREEDORTH_MAX_ISO_VOXELS:-14000000}
  THREEDORTH_GPU: ${THREEDORTH_GPU:-0}

services:
  api:
    image: 3dorth-api:latest
    container_name: 3dorth-api
    pull_policy: never                 # never reach a registry; use the loaded image
    network_mode: host                 # no bridge available in this container
    # Ports are dynamic (scripts/pick_ports.sh) and the bind address defaults to
    # 127.0.0.1 (STRICT: only the local Cloudflare tunnel reaches it — nothing on
    # the pod network). Set APP_BIND=0.0.0.0 for the "normal/exposed" mode.
    command: uvicorn api.main:app --host ${APP_BIND:-127.0.0.1} --port ${API_PORT:-8000}
    environment: *env
    volumes:
      - ./outputs:/app/outputs         # share.sh writes public_urls.json here; /api/config reads it
      - ./data:/app/data
    restart: unless-stopped

  trame:
    image: 3dorth-trame:latest
    container_name: 3dorth-trame
    pull_policy: never
    network_mode: host
    command: xvfb-run -a python -m app_trame.app --server --host ${APP_BIND:-127.0.0.1} --port ${TRAME_PORT:-8081} --timeout 0
    environment: *env
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    profiles: ["trame", "all"]
    restart: unless-stopped

  react:
    image: 3dorth-react:latest
    container_name: 3dorth-react
    pull_policy: never
    network_mode: host
    # nginx listens on the chosen REACT_PORT and proxies /api to the API on the same
    # host. NGINX_LISTEN_ADDR defaults to 127.0.0.1: (STRICT tunnel-only); set it to
    # "" (with APP_BIND=0.0.0.0) for the exposed mode.
    environment:
      NGINX_LISTEN_ADDR: "${NGINX_LISTEN_ADDR-127.0.0.1:}"
      NGINX_PORT: "${REACT_PORT:-8088}"
      API_UPSTREAM: "127.0.0.1:${API_PORT:-8000}"
    profiles: ["react", "all"]
    restart: unless-stopped
